  - id: capf-completion
    title: Expose Java-aware completion as a completion-at-point-function
    deliverable:
      - elisp/geiser-kawa-devutil-complete.el
      - elisp/tests/geiser-kawa-capf-test.el
    contract: |
      Add `geiser-kawa-capf` — a completion-at-point-function — that composes
      with corfu/company (no buffer mutation), reusing the FROZEN data source
      `geiser-kawa-devutil-complete--get-data` (S4). It must return either nil
      or (START END COLLECTION . PROPS) where START/END bound the symbol being
      completed and COLLECTION is the list of candidate strings derived from the
      get-data alist (completion-type "METHODS" -> the `names`; the
      symbols+package-members case -> `symbol-names` ++ `package-members`).
      Register it by adding `geiser-kawa-capf` to
      `completion-at-point-functions` (buffer-local) from a function hung on
      `geiser-repl-mode-hook` AND `scheme-mode-hook`, but ONLY for the kawa impl.
      Keep the existing interactive `geiser-kawa-devutil-complete-at-point`
      working (do not delete it).
    context: |
      `geiser-kawa-devutil-complete--get-data (code-str cursor-index)` sends
      `(geiser:kawa-devutil-complete <code> <idx>)` and returns an alist with
      keys incl: completion-type — EXACT literals are "METHODS", "FIELDS", and
      "SYMBOLS_PLUS_PACKAGEMEMBERS" (note the underscores; complete.el:133-138) —
      before-cursor, owner-class, modifiers, names, symbol-names, package-members.
      Region/cursor logic already exists in
      `geiser-kawa-devutil-complete--code-point-from-toplevel` (~:145) — reuse it
