# ============================================================================
# geiser-kawa modernization — architect plan (Momo Softworks fork)
# ============================================================================
# Architect: Opus (Samuel's key). Workers: NaviGator models via delegate.py.
# Run with the AGENTIC executor so workers edit existing files in place:
#
#   python3 ~/.claude/skills/architect/scripts/delegate.py \
#       .architect/plan.yaml --all --executor eca
#
# IMPORTANT — verify commands need a toolchain on PATH (JDK 8, emacs 27+,
# cask, git, network for Maven/jitpack/MELPA). Run delegate from inside a
# shell that has them, e.g. Samuel's existing geiser-kawa env:
#   guix shell -L ~/.config/guix/modules -m ~/Projects/kawa/guix.scm -- \
#       python3 .../delegate.py .architect/plan.yaml --all --executor eca
#
# ---------------------------------------------------------------------------
# FROZEN SEAMS (architect-owned; workers must NOT change these)
# ---------------------------------------------------------------------------
# S1 NAMES: the Elisp package name `geiser-kawa`, the implementation symbol
#    `'kawa`, every `geiser-kawa-*` function, and every `geiser:NAME` Kawa
#    procedure keep their current names (keeps the fork upstream-mergeable and
#    preserves the Elisp<->Java protocol). Add new names; never rename.
# S2 JAR: Maven artifactId stays `kawa-geiser`, version stays `0.1-SNAPSHOT`,
#    so the fat jar is `target/kawa-geiser-0.1-SNAPSHOT-jar-with-dependencies.jar`
#    (= the `geiser-kawa-deps-jar-path` default). Do NOT change it. groupId may
#    change to `com.momosoftworks`.
# S3 PROTOCOL: the `geiser:* -> Class:method` registry in Geiser.java
#    (procMap, Geiser.java:34-46) is frozen for the existing 11 procedures:
#      geiser:eval            -> kawageiser.GeiserEval:evalStr
#      geiser:autodoc         -> kawageiser.GeiserAutodoc:autodoc
#      geiser:completions     -> kawageiser.GeiserCompleteSymbol:getCompletions
#      geiser:module-completions -> kawageiser.GeiserCompleteModule:completeModule
#      geiser:load-file       -> kawageiser.GeiserLoadFile:loadFile
#      geiser:no-values       -> kawageiser.GeiserNoValues:noValues
#      geiser:macroexpand     -> kawageiser.GeiserMacroexpand:expand
#      geiser:kawa-devutil-complete -> kawageiser.kawadevutil.Complete:completeJava
#      geiser:kawa-devutil-complete-expr-tree -> ...Complete:getExprTreeFormatted
#      geiser:kawa-devutil-expr-tree-formatted -> ...ExprTree:getExprTreeFormatted
#      geiser:manual-epub-unzip-to-tmp-dir -> ...docutil.ManualEpubUnzipToTmpDir:unzipToTmpDir
# S4 REUSE: these Elisp helpers are stable building blocks — call them, don't
#    redefine: `geiser-kawa-util--eval`, `geiser-kawa-util--retort-result`,
#    `geiser-kawa-devutil-complete--get-data` (returns an alist whose
#    completion-type is "METHODS"/"SYMBOLS+PACKAGE-MEMBERS" etc.), and the
#    classpath builder `geiser-kawa-arglist--make-classpath`.
#
# FILE OWNERSHIP (each file edited by exactly one goal; same-file goals are
# chained via depends_on so eca never races):
#   geiser-kawa.el, geiser-kawa-deps.el, quickstart.el  -> elisp-modernize
#   pom.xml, src/main/java/**                            -> build-kawa311
#   geiser-kawa-devutil-complete.el, tests/...capf...    -> capf-completion
#   geiser-kawa-arglist.el, tests/...classpath...        -> kawacraft-classpath
#   geiser-kawa-connect.el (new)                          -> connect-repl
#   src/test/java/**                                      -> junit-tests
#   tests/geiser-kawa-test.el                             -> buttercup-modernize
#   .github/workflows/ci.yml (new)                        -> ci-github
#   README.org                                            -> readme-fork
#
# STRETCH BACKLOG (architect-owned; NOT worker goals — see .architect/README.md):
#   xref/jump-to-def (geiser:symbol-location), symbol-documentation,
#   macroexpand-1-vs-all, enter-debugger, remote .class injection, MELPA recipe,
#   auto-download Kawa manual.
# ============================================================================

