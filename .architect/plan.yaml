  - id: connect-repl
    title: Connect Geiser to an already-running external Kawa REPL (in-game socket)
    deliverable:
      - elisp/geiser-kawa-connect.el
    contract: |
      New module providing an autoloaded interactive command
      `geiser-kawa-connect (host port)` that attaches a Geiser REPL to a Kawa
      process already listening on a TCP socket (KawaCraft's in-game REPL:
      client=4243, server=4242). Implement via geiser's remote-connection entry
      point `geiser-connect` for the `'kawa` implementation (geiser 0.26+ exposes
      `geiser-connect IMPL HOST PORT`). The command must:
        - default host "localhost", read host+port interactively,
        - call (geiser-connect 'kawa host port),
        - (require 'geiser-kawa) so the impl is registered.
      Provide the feature `geiser-kawa-connect`. Do NOT edit geiser-kawa.el.
    context: |
      KawaCraft (a Minecraft mod) starts a raw Kawa REPL on a socket during the
      Forge init phase; redefining a Scheme procedure over it hot-reloads game
      behaviour. Today Samuel uses a raw comint; this makes it a first-class
      Geiser REPL (eval-from-buffer, autodoc, completion against the LIVE game).
      Geiser exposes `geiser-connect` (geiser-repl.el) which prompts for impl,
      host, port and dials a TCP REPL; the kawa impl's prompt-regexp is
      `"#|kawa:[0-9]+|# "` (geiser-kawa--prompt-regexp). The in-game REPL is raw
      Kawa WITHOUT kawa-geiser's `geiser:*` procedures loaded, so eval works but
      Java-aware completion/autodoc may not — note this in the docstring.
    spec: |
      Mechanical verify only covers that it byte-compiles and defines the
      command; the live connect is a manual/operator check (see README backlog).
    verify:
      kind: command
      run: |
        set -e
        cask install >/dev/null 2>&1 || true
        cask emacs -Q --batch -L . -L elisp -f batch-byte-compile elisp/geiser-kawa-connect.el
        emacs -Q --batch -L elisp --eval '(progn (require (quote geiser-kawa-connect)) (unless (commandp (quote geiser-kawa-connect)) (kill-emacs 1)))' 2>/dev/null || \
        grep -q "(defun geiser-kawa-connect" elisp/geiser-kawa-connect.el
    depends_on: [elisp-modernize]
    budget: 6

