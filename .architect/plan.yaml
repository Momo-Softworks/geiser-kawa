  - id: junit-tests
    title: Java unit tests pass against Kawa 3.1.1
    deliverable:
      - src/test/java/kawageiser/GeiserSmokeTest.java
    contract: |
      Create exactly ONE new file, src/test/java/kawageiser/GeiserSmokeTest.java,
      a TestNG test class in package `kawageiser` with a single @Test method that
      exercises the Java-aware completion seam (the existing GeiserTest.java and
      GeiserAutodocTest.java already cover eval+autodoc and must keep passing —
      do NOT edit them). The new test must assert that
      `Complete.completeJava` for the code "(java.lang.String:)" with cursor 18
      returns a string CONTAINING "format" (a java.lang.String method).
      `./mvnw -q test` must stay green. Do not touch any other file.
    context: |
      Write this file VERBATIM (it is self-contained and compiles against the
      vendored build — every import and type is exact; do not invent others):

      === FILE: src/test/java/kawageiser/GeiserSmokeTest.java ===
      /*
       * SPDX-License-Identifier: BSD-3-Clause
       */
      package kawageiser;

      import gnu.expr.Language;
      import gnu.lists.IString;
      import gnu.math.IntNum;
      import gnu.mapping.Environment;
      import kawa.standard.Scheme;
      import kawageiser.kawadevutil.Complete;
      import org.testng.annotations.Test;

      import static org.testng.Assert.assertTrue;

      public class GeiserSmokeTest {
          @Test
          public void testJavaMemberCompletionContainsFormat() throws Throwable {
              // completeJava needs a current Language; set up a Scheme like the
              // autodoc test does.
              Scheme scheme = new Scheme();
              Language saveLang = Language.setSaveCurrent(scheme);
              try {
                  // "(java.lang.String:)" — index 18 is right after the ':'.
                  String result = Complete.completeJava(
                          IString.valueOf("(java.lang.String:)"),
                          IntNum.valueOf(18));
                  assertTrue(result.contains("format"),
                          "expected a java.lang.String member 'format' in: " + result);
              } finally {
                  Language.restoreCurrent(saveLang);
              }
          }
      }
      === END FILE ===

      Why these types: Complete.completeJava is declared
      `public static String completeJava(IString codeStr, IntNum cursorIndex)`
      in src/main/java/kawageiser/kawadevutil/Complete.java:38. IString is
      gnu.lists.IString (build it with IString.valueOf(String)); IntNum is
      gnu.math.IntNum (build it with IntNum.valueOf(int)). The bundled Kawa
      classes (gnu.*, kawa.*) come transitively from the vendored kawa-devutil
      jar, exactly as GeiserAutodocTest.java already uses them.
    verify:
      kind: command
      run: |
        set -e
        test -f src/test/java/kawageiser/GeiserSmokeTest.java
        grep -q 'class GeiserSmokeTest' src/test/java/kawageiser/GeiserSmokeTest.java
        grep -q 'completeJava' src/test/java/kawageiser/GeiserSmokeTest.java
        ./mvnw -q test
    depends_on: [build-kawa311]
    budget: 7

