  # ===========================================================================
  # FOLLOW-UP FEATURE: member-precise Java jump-to-definition (M-.)
  # New seam S5 (additive; S3 freezes the existing 11 procedures, new ones are
  # allowed): Kawa procedure `geiser:java-symbol-location` ->
  # `kawageiser.GeiserJavaLocation:locate`. Takes the SAME (code-str,
  # cursor-index) as completion (so Elisp reuses --code-point-from-toplevel),
  # resolves owner-class via kawa-devutil reflection, and returns a readable
  # Lisp form (string keys, 2-element lists, like the completion data):
  #   (("matches" ((("member" "format")
  #                 ("signature" "public static java.lang.String format(...)")
  #                 ("source-resource" "java/lang/String.java")
  #                 ("line" 2961)) ...))
  #    ("class" "java.lang.String"))
  # Member-precise line numbers come from `javap -l' (LineNumberTable) of the
  # compiled class; overloads are separate matches keyed by signature so Elisp
  # can offer a chooser. Validated: RFG recompiled MC classes carry line tables
  # that map exactly into mcp_patched_minecraft-sources.jar.
  # New defcustom `geiser-kawa-source-path` (sibling of -extra-classpath): list
  # of source jars/zips/dirs (.dir-locals.el-settable), best-effort JDK src.zip.
  # ===========================================================================
  - id: java-loc-backend
    title: Kawa backend for member-precise Java jump-to-definition (geiser:java-symbol-location)
    deliverable:
      - src/main/java/kawageiser/GeiserJavaLocation.java
      - src/test/java/kawageiser/GeiserJavaLocationTest.java
    contract: |
      Add GeiserJavaLocation.locate(IString codeStr, IntNum cursorIndex) and
      register geiser:java-symbol-location -> kawageiser.GeiserJavaLocation:locate
      in Geiser.java's procMap (S5). Reuse CompletionFindGeneric.find +
      CompletionForClassMember.getOwnerClass()/getCursorFinder() to resolve the
      owner class and member; read precise lines from `javap -l' (pass the
      class's CodeSource as -classpath; null CodeSource = bootstrap JDK class).
      Return the (matches/class) Lisp form above. Keep S3's existing methods.
    context: |
      Done by architect 2026-06-24. javap -l output format (JDK 8): a 2-space
      method decl line ".. name(params);", then "    LineNumberTable:" then
      "      line N: 0" (first entry = the line). Field lines are not in
      LineNumberTable (best-effort/skip). Nested classes Foo$Bar -> source
      resource pkg/Foo.java (strip at first '$').
    verify:
      kind: command
      run: "./mvnw -q test"
    depends_on: [build-kawa311]
    budget: 8

  - id: java-loc-sourcepath
    title: Elisp source-path resolver (find/extract a .java from source jars/zips/dirs)
    deliverable:
      - elisp/geiser-kawa-java-location.el
      - elisp/tests/geiser-kawa-java-location-test.el
    contract: |
      New module providing defcustom `geiser-kawa-source-path` (repeat string,
      default nil, :safe a list-of-strings predicate, .dir-locals.el-settable)
      and a pure function
        (geiser-kawa-java-location--resolve-source RESOURCE) -> file path or nil
      where RESOURCE is like "net/minecraft/util/MathHelper.java". It searches
      each entry of geiser-kawa-source-path: a directory (look for the file
      under it), or a .jar/.zip/.srcjar (extract that entry to a cache dir under
      temporary-file-directory and return the extracted path). Best-effort:
      also try a JDK src.zip discovered from the `java' binary on PATH.
      No running REPL needed.
    context: |
      Mirror geiser-kawa-extra-classpath (geiser-kawa-arglist.el) for the
      defcustom shape. For zip extraction reuse Emacs' `arc-mode'/`archive-*' or
      shell `unzip`; deterministic cache path = (expand-file-name RESOURCE
      (make a stable subdir of temporary-file-directory)). Provide feature
      `geiser-kawa-java-location'.
    verify:
      kind: command
      run: "cask install >/dev/null 2>&1 || true; cask emacs --batch -L . -L elisp -l buttercup -l elisp/tests/geiser-kawa-java-location-test.el -f buttercup-run"
    depends_on: [elisp-modernize]
    budget: 7

  - id: java-loc-jump
    title: Wire member-precise Java jump-to-def into M-. (overload chooser)
    deliverable:
      - elisp/geiser-kawa-java-location.el
      - elisp/tests/geiser-kawa-java-location-jump-test.el
    contract: |
      Add an autoloaded interactive command `geiser-kawa-jump-to-java-definition'
      that: sends (geiser:java-symbol-location <code-str> <cursor-index>) using
      the region/cursor from geiser-kawa-devutil-complete--code-point-from-toplevel,
      reads the matches, resolves each match's source-resource via
      geiser-kawa-java-location--resolve-source, and visits the file at the
      match `line'. If >1 match, `completing-read' over their `signature's first.
      Also register geiser's `symbol-location' method for the kawa impl (drop it
      from `unsupported-procedures' in geiser-kawa.el) so M-. routes here.
      Degrade gracefully (message, no error) when there are no matches or the
      source is not on geiser-kawa-source-path.
    context: |
      Reuse --code-point-from-toplevel (returns code-str + cursor-index) exactly
      as geiser-kawa-capf does. Backend returns string keys; read with
      geiser-kawa-util--retort-result then (cadr (assoc "line" m)) etc.
    verify:
      kind: command
      run: "cask install >/dev/null 2>&1 || true; cask emacs --batch -L . -L elisp -l buttercup -l elisp/tests/geiser-kawa-java-location-jump-test.el -f buttercup-run"
    depends_on: [java-loc-backend, java-loc-sourcepath, capf-completion]
    budget: 8
